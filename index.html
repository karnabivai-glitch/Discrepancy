<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC Discrepancy System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { background: #004a99; color: white; padding: 20px; text-align: center; margin-bottom: 30px; }
        .negative { color: red; font-weight: bold; }
        .positive { color: blue; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2>Sistem Rekonsiliasi Stok (IC)</h2>
</div>

<div class="container">
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card p-4">
                <h6>File ERP (AdminInventoryBalance)</h6>
                <input type="file" id="erpFile" class="form-control">
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4">
                <h6>File SCAN (Hasil Opname)</h6>
                <input type="file" id="scanFile" class="form-control">
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <button class="btn btn-primary px-5 py-2" onclick="prosesData()">MULAI PROSES</button>
    </div>

    <div id="outArea" class="mt-4 d-none">
        <div class="card p-4">
            <table class="table table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>Article</th>
                        <th>Description</th>
                        <th class="text-center">System</th>
                        <th class="text-center">Physical</th>
                        <th class="text-center">Diff</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function prosesData() {
    // Cek apakah library termuat
    if (typeof Papa === 'undefined') {
        alert("Gagal memuat library pemroses CSV. Pastikan Anda terhubung ke internet atau gunakan file papaparse.min.js lokal.");
        return;
    }

    const f1 = document.getElementById('erpFile').files[0];
    const f2 = document.getElementById('scanFile').files[0];
    if(!f1 || !f2) return alert("Pilih kedua file!");

    const body = document.getElementById('resultBody');
    body.innerHTML = "<tr><td colspan='5' class='text-center'>Memproses...</td></tr>";
    document.getElementById('outArea').classList.remove('d-none');

    const parse = (file) => new Promise(res => Papa.parse(file, {header:true, skipEmptyLines:true, complete: r => res(r.data)}));
    
    try {
        const erp = await parse(f1);
        const scan = await parse(f2);

        // Map Scan Fisik
        const fisik = {};
        scan.forEach(r => {
            let a = r['Article'] || r['article'];
            if(a) { a = a.trim(); fisik[a] = (fisik[a] || 0) + 1; }
        });

        body.innerHTML = "";
        erp.forEach(r => {
            const art = r['Product Code'];
            if(!art || art.includes("Inventory") || art === "Product Code") return;

            const sys = parseInt(r['Quantity']) || 0;
            const phy = fisik[art.trim()] || 0;
            const diff = phy - sys;

            const tr = document.createElement('tr');
            let diffTxt = diff === 0 ? "0" : (diff > 0 ? `<span class="positive">+${diff}</span>` : `<span class="negative">(${Math.abs(diff)})</span>`);
            
            tr.innerHTML = `<td>${art}</td><td>${r['Name'] || ''}</td><td class="text-center">${sys}</td><td class="text-center">${phy}</td><td class="text-center">${diffTxt}</td>`;
            body.appendChild(tr);
        });
    } catch(e) { alert("Error: " + e.message); }
}
</script>
</body>
</html>
